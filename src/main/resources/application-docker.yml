# MsQwen Application Configuration - Docker Profile
# Этот профиль используется при запуске в Docker контейнере
# SPRING_PROFILES_ACTIVE=docker

spring:
  application:
    name: MsQwen

  # H2 Database Configuration - Docker (файл в volume)
  datasource:
    url: jdbc:h2:file:/app/data/msqwen;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  # H2 Console (отключён в production)
  h2:
    console:
      enabled: false

  # Liquibase Configuration
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  # Cache Configuration
  cache:
    type: simple
    cache-names: analysis
    simple:
      initial-capacity: 50
      maximum-size: 500

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /
  # Compression для оптимизации трафика
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024

# Springdoc OpenAPI (Swagger) Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    # В production можно отключить
    enabled: true

# Logging Configuration - Docker (консоль + файл)
logging:
  level:
    root: INFO
    com.isalnikov.msqwen: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /app/logs/msqwen.log
  # Ротация логов через logback-spring.xml

# Telegram Bot Configuration
telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}
    username: ${TELEGRAM_BOT_USERNAME:MsQwenBot}

# Qwen CLI Configuration
qwen:
  cli:
    path: ${QWEN_CLI_PATH:qwen}
    timeout: ${QWEN_CLI_TIMEOUT:300}

# Scheduler Configuration
scheduler:
  enabled: ${SCHEDULER_ENABLED:true}
  parse:
    enabled: ${SCHEDULER_PARSE_ENABLED:true}
    cron: ${SCHEDULER_PARSE_CRON:0 */30 * * * *}
  analyze:
    enabled: ${SCHEDULER_ANALYZE_ENABLED:true}
    cron: ${SCHEDULER_ANALYZE_CRON:0 0 * * * *}
  cleanup:
    enabled: ${SCHEDULER_CLEANUP_ENABLED:true}
    cron: ${SCHEDULER_CLEANUP_CRON:0 0 3 * * *}
  cache:
    enabled: ${SCHEDULER_CACHE_ENABLED:true}
    cron: ${SCHEDULER_CACHE_CRON:0 0 4 * * *}

# Cache Configuration
cache:
  analysis:
    ttl: ${CACHE_ANALYSIS_TTL:3600}

# News Cleanup Configuration
news:
  cleanup:
    days: ${NEWS_CLEANUP_DAYS:30}

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}

# Rate Limiting Configuration
rate-limit:
  enabled: ${RATE_LIMIT_ENABLED:true}
  requests-per-minute: ${RATE_LIMIT_REQUESTS_PER_MINUTE:60}

# CLI Configuration
cli:
  enabled: ${CLI_ENABLED:true}

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
